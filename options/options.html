<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recording Pro - 設定</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <h1>Recording Pro 設定</h1>

    <section class="section">
      <h2>Google Drive連携</h2>
      <div class="field">
        <label>
          <label class="toggle-switch">
            <input type="checkbox" id="drive-enabled">
            <span class="toggle-slider"></span>
          </label>
          <span class="toggle-label">録画後に自動でGoogle Driveにアップロード</span>
          <span id="drive-status" class="toggle-status off">OFF</span>
        </label>
      </div>
      <div class="field">
        <label for="drive-folder-id">保存先フォルダID</label>
        <input type="text" id="drive-folder-id" placeholder="Google DriveのフォルダIDを入力">
        <p class="hint">Google DriveのフォルダURLの末尾部分（例: https://drive.google.com/drive/folders/<strong>ここの部分</strong>）</p>
      </div>
    </section>

    <section class="section">
      <h2>AI自動分析</h2>
      <div class="field">
        <label>
          <label class="toggle-switch">
            <input type="checkbox" id="ai-enabled">
            <span class="toggle-slider"></span>
          </label>
          <span class="toggle-label">録画後にAIで自動分析（文字起こし + 要約）</span>
          <span id="ai-status" class="toggle-status off">OFF</span>
        </label>
      </div>
      <div class="field">
        <label for="ai-provider">AIプロバイダー</label>
        <select id="ai-provider">
          <option value="openai">OpenAI (GPT-4o + Whisper)</option>
          <option value="anthropic">Anthropic (Claude) + OpenAI Whisper</option>
        </select>
        <p class="hint">文字起こしにはOpenAI Whisper APIを使用します。分析にはお好みのプロバイダーを選択してください。</p>
      </div>
      <div class="field">
        <label for="ai-api-key">OpenAI APIキー</label>
        <input type="password" id="ai-api-key" placeholder="sk-...">
        <p class="hint">文字起こし（Whisper）に必要です。分析もOpenAIの場合はこのキーを使用します。</p>
      </div>
      <div class="field" id="anthropic-key-field" style="display:none">
        <label for="anthropic-api-key">Anthropic APIキー</label>
        <input type="password" id="anthropic-api-key" placeholder="sk-ant-...">
      </div>
    </section>

    <section class="section">
      <h2>担当者設定</h2>
      <p class="section-desc">担当者ごとにGoogle Driveの保存先フォルダを設定できます。録画時に担当者を選択すると、そのフォルダに保存されます。</p>
      <div id="staff-list"></div>
      <div class="staff-add-row">
        <input type="text" id="staff-name-input" placeholder="担当者名">
        <input type="text" id="staff-folder-input" placeholder="DriveフォルダID">
        <button id="staff-add-btn" class="btn-add" type="button">追加</button>
      </div>
    </section>

    <section class="section">
      <h2>録画設定</h2>
      <div class="field">
        <label for="video-quality">映像品質</label>
        <select id="video-quality">
          <option value="1000000">低 (1 Mbps)</option>
          <option value="2500000" selected>中 (2.5 Mbps)</option>
          <option value="5000000">高 (5 Mbps)</option>
          <option value="8000000">最高 (8 Mbps)</option>
        </select>
      </div>
    </section>

    <div class="actions">
      <button id="save-btn" class="btn-primary">設定を保存</button>
      <span id="save-status" class="save-status"></span>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
