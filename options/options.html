<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recording Pro</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <h1 data-i18n="optionsTitle"></h1>

    <section class="section license-section">
      <h2 data-i18n="planLicense"></h2>
      <div class="plan-status-row">
        <span class="plan-current-label" data-i18n="currentPlan"></span>
        <span id="options-plan-badge" class="plan-badge-lg free">FREE</span>
      </div>
      <div id="license-activate" class="license-form">
        <div class="field">
          <label for="license-key-input" data-i18n="licenseKey"></label>
          <div class="license-input-row">
            <input type="text" id="license-key-input" data-i18n-placeholder="licenseKeyPlaceholder">
            <button id="license-activate-btn" class="btn-add" type="button" data-i18n="activate"></button>
          </div>
          <p id="license-error" class="license-error hidden"></p>
        </div>
        <p class="hint"><span data-i18n="licenseHint"></span> <a id="options-upgrade-link" href="#" class="link-gold" data-i18n="purchasePro"></a></p>
      </div>
      <div id="license-active" class="license-active hidden">
        <div class="license-info">
          <div><strong data-i18n="planLabel"></strong> <span id="license-plan-name"></span></div>
          <div id="license-expires-row"><strong data-i18n="expiresAt"></strong> <span id="license-expires"></span></div>
        </div>
        <button id="license-deactivate-btn" class="btn-deactivate" type="button" data-i18n="deactivateLicense"></button>
      </div>
    </section>

    <section class="section" id="section-drive">
      <h2><span data-i18n="driveIntegration"></span> <span id="pro-tag-drive" class="pro-tag hidden">PRO</span></h2>
      <div class="field">
        <label>
          <label class="toggle-switch">
            <input type="checkbox" id="drive-enabled">
            <span class="toggle-slider"></span>
          </label>
          <span class="toggle-label" data-i18n="driveAutoUpload"></span>
          <span id="drive-status" class="toggle-status off">OFF</span>
        </label>
      </div>
      <div class="field">
        <label for="drive-folder-id" data-i18n="driveFolderId"></label>
        <input type="text" id="drive-folder-id" data-i18n-placeholder="driveFolderPlaceholder">
        <p class="hint"><span data-i18n="driveFolderHint"></span><strong data-i18n="driveFolderHintBold"></strong>）</p>
      </div>
    </section>

    <section class="section">
      <h2><span data-i18n="aiAutoAnalysis"></span> <span id="pro-tag-ai" class="pro-tag hidden">PRO</span></h2>
      <div class="field">
        <label>
          <label class="toggle-switch">
            <input type="checkbox" id="ai-enabled">
            <span class="toggle-slider"></span>
          </label>
          <span class="toggle-label" data-i18n="aiAutoDesc"></span>
          <span id="ai-status" class="toggle-status off">OFF</span>
        </label>
      </div>
      <div class="field">
        <label for="ai-provider" data-i18n="aiProvider"></label>
        <select id="ai-provider">
          <option value="openai" data-i18n="aiProviderOpenai"></option>
          <option value="anthropic" data-i18n="aiProviderAnthropic"></option>
        </select>
        <p class="hint" data-i18n="aiProviderHint"></p>
      </div>
    </section>

    <section class="section">
      <h2 data-i18n="staffSettings"></h2>
      <p class="section-desc" data-i18n="staffSettingsDesc"></p>
      <div id="staff-list"></div>
      <div class="staff-add-row">
        <input type="text" id="staff-name-input" data-i18n-placeholder="staffName">
        <input type="text" id="staff-folder-input" data-i18n-placeholder="staffFolderIdPlaceholder">
        <button id="staff-add-btn" class="btn-add" type="button" data-i18n="add"></button>
      </div>
    </section>

    <section class="section">
      <h2 data-i18n="recordingSettings"></h2>
      <div class="field">
        <label for="video-quality" data-i18n="videoQuality"></label>
        <select id="video-quality">
          <option value="1000000" data-i18n="qualityLow"></option>
          <option value="2500000" selected data-i18n="qualityMedium"></option>
          <option value="5000000" data-i18n="qualityHigh"></option>
          <option value="8000000" data-i18n="qualityMax"></option>
        </select>
      </div>
    </section>

    <div class="actions">
      <button id="save-btn" class="btn-primary" data-i18n="saveSettings"></button>
      <span id="save-status" class="save-status"></span>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
